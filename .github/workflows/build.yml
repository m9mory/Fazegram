name: CI

on:
  push:
    branches: [ master ]

  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v2
        with:
          submodules: 'recursive'
          fetch-depth: '0'

      - name: Restore Bazel Cache
        uses: actions/cache/restore@v3
        with:
          path: /private/var/tmp/_bazel_containerhost
          key: ${{ runner.os }}-bazel-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-bazel-

      - name: Set active Xcode path
        run: |
          XCODE_VERSION=$(cat versions.json | python3 -c 'import json,sys;obj=json.load(sys.stdin);print(obj["xcode"]);')
          sudo xcode-select -s /Applications/Xcode_$XCODE_VERSION.app/Contents/Developer

      - name: Create canonical source directory
        run: |
          set -x
          sudo mkdir -p /Users/Shared
          cp -R $GITHUB_WORKSPACE /Users/Shared/
          mv /Users/Shared/$(basename $GITHUB_WORKSPACE) /Users/Shared/telegram-ios

      - name: Build the App
        run: |
          set -x

          SOURCE_DIR=/Users/Shared/telegram-ios
          BAZEL_USER_ROOT="/private/var/tmp/_bazel_containerhost"

          cd $SOURCE_DIR

          BUILD_NUMBER_OFFSET="$(cat build_number_offset)"

          export APP_VERSION=$(cat versions.json | python3 -c 'import json,sys;obj=json.load(sys.stdin);print(obj["app"]);')
          export COMMIT_COUNT=$(git rev-list --count HEAD)
          export COMMIT_COUNT="$(($COMMIT_COUNT+$BUILD_NUMBER_OFFSET))"
          export BUILD_NUMBER="$COMMIT_COUNT"
          echo "BUILD_NUMBER=$(echo $BUILD_NUMBER)" >> $GITHUB_ENV
          echo "APP_VERSION=$(echo $APP_VERSION)" >> $GITHUB_ENV

          python3 build-system/Make/ImportCertificates.py --path build-system/fake-codesigning/certs
          
          export BAZEL_FLAGS="--local_ram_resources=6144"

          python3 -u build-system/Make/Make.py \
            --bazelUserRoot="$BAZEL_USER_ROOT" \
            build \
            --configurationPath="build-system/appstore-configuration.json" \
            --codesigningInformationPath=build-system/fake-codesigning \
            --configuration=release_arm64 \
            --buildNumber="$BUILD_NUMBER"

          OUTPUT_PATH="$SOURCE_DIR/build/artifacts"
          rm -rf "$OUTPUT_PATH"
          mkdir -p "$OUTPUT_PATH"
          
          # УЛУЧШЕННЫЙ ПОИСК: Ищем вообще любой .ipa, который родил Базель
          echo "=== Начинаем поиск собранного IPA ==="
          FOUND_IPA=$(find "$SOURCE_DIR" \( -name "bazel-out" -o -name "bazel-bin" \) -prune -o -name "*.ipa" -print -quit)
          
          if [ -n "$FOUND_IPA" ]; then
            echo "Ура, нашли IPA тут: $FOUND_IPA"
            cp "$FOUND_IPA" "$OUTPUT_PATH/Fazegram.ipa"
          else
            echo "БЛИН! Базель не собрал IPA или спрятал его. Выводим список файлов для отладки:"
            find "$SOURCE_DIR" -name "*.ipa" || true
            exit 1
          fi
          
          mkdir -p "$SOURCE_DIR/build/DSYMs"
          find "$SOURCE_DIR/bazel-out" -name "*.dSYM" -exec cp -R {} "$SOURCE_DIR/build/DSYMs/" \;
          
          zip -r "$OUTPUT_PATH/Fazegram.DSYMs.zip" "$SOURCE_DIR/build/DSYMs" 1>/dev/null

      - name: Save Bazel Cache
        uses: actions/cache/save@v3
        with:
          path: /private/var/tmp/_bazel_containerhost
          key: ${{ runner.os }}-bazel-${{ github.sha }}

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: build-${{ env.BUILD_NUMBER }}
          release_name: Fazegram ${{ env.APP_VERSION }} (${{ env.BUILD_NUMBER }})
          body: |
            An unsigned build of Fazegram for iOS ${{ env.APP_VERSION }} (${{ env.BUILD_NUMBER }})
          draft: false
          prerelease: false

      - name: Upload Release IPA
        id: upload-release-ipa 
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: /Users/Shared/telegram-ios/build/artifacts/Fazegram.ipa
          asset_name: Fazegram.ipa
          asset_content_type: application/octet-stream

      - name: Upload Release DSYM
        id: upload-release-dsym 
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: /Users/Shared/telegram-ios/build/artifacts/Fazegram.DSYMs.zip
          asset_name: Fazegram.DSYMs.zip
          asset_content_type: application/zip
